<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミタニ市長選挙</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
    }

    .top {
      height: 100vh;
      width: 100vw;
      color: white;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .top h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .top p {
      font-size: 16px;
      line-height: 1.8;
    }

    .start-button {
      margin-top: 32px;
      padding: 14px 36px;
      font-size: 18px;
      border: none;
      border-radius: 999px;
      background: white;
      color: black;
      cursor: pointer;
    }

    .reels-container {
      display: none;
      height: 100vh;
      width: 100vw;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      background: black;
    }

    .reel {
      height: 100vh;
      width: 100vw;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    .end {
      height: 100vh;
      width: 100vw;
      scroll-snap-align: start;
      color: white;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>

<body>

  <div class="top" id="top">
    <h1>MitaniTube<br>動画視聴サイト</h1>
    <p>
      このウェブサイトでは、ミタニ市長選挙に関連するショート動画を視聴できます。<br>
      上にスワイプして次の動画に進んでください。
    </p>
    <button class="start-button" onclick="startVideos()">スタート</button>
  </div>

  <div class="reels-container" id="reels"></div>

  <script>
    const videos = [
      "video001_選挙管理委員会広報動画.mp4",
      "フェイク動画01_風間候補による駅員への暴言.mp4",
      "video07.mp4"
    ];

    videos.sort(() => Math.random() - 0.5);

    const reels = document.getElementById("reels");

    videos.forEach((url) => {
      const section = document.createElement("section");
      section.className = "reel";

      const video = document.createElement("video");
      video.src = url;
      video.controls = true;
      video.playsInline = true;
      video.muted = false;
      video.volume = 1.0;
      video.preload = "metadata";
      
      section.appendChild(video);
      reels.appendChild(section);
    });

    const end = document.createElement("section");
    end.className = "end";
    end.innerHTML = "もう一度、ご覧になる場合はスワイプしてください。";
    reels.appendChild(end);

    function startVideos() {
      document.getElementById("top").style.display = "none";
      reels.style.display = "block";

      const firstVideo = document.querySelector("video");
      firstVideo.play().catch(() => {});
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target.querySelector("video");
        if (!video) return;

        if (entry.isIntersecting) {
          video.play().catch(() => {});
        } else {
          video.pause();
          video.currentTime = 0;
        }
      });
    }, {
      threshold: 0.7
    });

    document.querySelectorAll(".reel").forEach(reel => {
      observer.observe(reel);
    });
  </script>

</body>
</html>
